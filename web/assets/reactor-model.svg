<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, sans-serif">
  <defs>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="steamGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="concreteGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#0a0e14"/>

  <!-- ═══════ CONTAINMENT STRUCTURE ═══════ -->
  <g id="containment">
    <!-- Dome -->
    <path d="M 80 300 L 80 150 Q 80 60 190 60 L 210 60 Q 320 60 320 150 L 320 300 Z"
          fill="url(#concreteGrad)" stroke="#4b5563" stroke-width="3"/>
    <text x="200" y="320" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">CONTAINMENT</text>

    <!-- ─── Reactor Pressure Vessel ─── -->
    <rect x="140" y="120" width="120" height="160" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="200" y="110" text-anchor="middle" fill="#64748b" font-size="8">REACTOR VESSEL</text>

    <!-- Fuel assemblies (blue glow) -->
    <g id="fuel-rods-svg">
      <rect x="160" y="150" width="5" height="100" fill="#3b82f6" opacity="0.7" rx="1"/>
      <rect x="170" y="150" width="5" height="100" fill="#3b82f6" opacity="0.7" rx="1"/>
      <rect x="180" y="150" width="5" height="100" fill="#3b82f6" opacity="0.7" rx="1"/>
      <rect x="190" y="150" width="5" height="100" fill="#3b82f6" opacity="0.7" rx="1"/>
      <rect x="200" y="150" width="5" height="100" fill="#3b82f6" opacity="0.7" rx="1"/>
      <rect x="210" y="150" width="5" height="100" fill="#3b82f6" opacity="0.7" rx="1"/>
      <rect x="220" y="150" width="5" height="100" fill="#3b82f6" opacity="0.7" rx="1"/>
      <rect x="230" y="150" width="5" height="100" fill="#3b82f6" opacity="0.7" rx="1"/>
      <rect x="240" y="150" width="5" height="100" fill="#3b82f6" opacity="0.7" rx="1"/>
      <!-- Cerenkov glow -->
      <rect x="155" y="145" width="95" height="110" rx="4" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.3"/>
    </g>

    <!-- Control Rods (gray, from top) -->
    <g id="control-rods-svg">
      <rect x="165" y="100" width="4" height="60" fill="#64748b" rx="1"/>
      <rect x="185" y="100" width="4" height="60" fill="#64748b" rx="1"/>
      <rect x="205" y="100" width="4" height="60" fill="#64748b" rx="1"/>
      <rect x="225" y="100" width="4" height="60" fill="#64748b" rx="1"/>
      <rect x="245" y="100" width="4" height="60" fill="#64748b" rx="1"/>
    </g>
    <text x="200" y="95" text-anchor="middle" fill="#94a3b8" font-size="7">CONTROL RODS</text>

    <!-- Coolant water in vessel -->
    <rect x="142" y="250" width="116" height="28" fill="url(#waterGrad)" rx="4"/>
  </g>

  <!-- ═══════ STEAM GENERATOR ═══════ -->
  <g id="steam-generator" transform="translate(330, 100)">
    <rect x="0" y="30" width="60" height="120" rx="6" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <!-- Tube bundle -->
    <path d="M 15 50 Q 15 30 30 30 Q 45 30 45 50" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 15 70 Q 15 50 30 50 Q 45 50 45 70" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 15 90 Q 15 70 30 70 Q 45 70 45 90" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.5"/>
    <text x="30" y="170" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="600">STEAM GEN</text>
  </g>

  <!-- ═══════ HOT/COLD LEG PIPES ═══════ -->
  <!-- Hot leg (vessel → steam gen) -->
  <line x1="260" y1="160" x2="330" y2="160" stroke="#ef4444" stroke-width="4" opacity="0.6"/>
  <text x="295" y="153" text-anchor="middle" fill="#ef4444" font-size="7" opacity="0.8">HOT LEG</text>
  <!-- Cold leg (steam gen → vessel) -->
  <line x1="260" y1="240" x2="330" y2="240" stroke="#3b82f6" stroke-width="4" opacity="0.6"/>
  <text x="295" y="255" text-anchor="middle" fill="#3b82f6" font-size="7" opacity="0.8">COLD LEG</text>

  <!-- ═══════ STEAM LINE ═══════ -->
  <path d="M 390 130 L 390 60 L 500 60" stroke="#94a3b8" stroke-width="3" fill="none" stroke-dasharray="6 3"/>
  <text x="445" y="52" text-anchor="middle" fill="#94a3b8" font-size="8">STEAM LINE</text>

  <!-- ═══════ TURBINE ═══════ -->
  <g id="turbine" transform="translate(500, 30)">
    <polygon points="0,15 60,0 60,60 0,45" fill="#334155" stroke="#475569" stroke-width="2"/>
    <!-- Blade lines -->
    <line x1="15" y1="18" x2="45" y2="10" stroke="#64748b" stroke-width="1"/>
    <line x1="15" y1="26" x2="45" y2="20" stroke="#64748b" stroke-width="1"/>
    <line x1="15" y1="34" x2="45" y2="30" stroke="#64748b" stroke-width="1"/>
    <line x1="15" y1="42" x2="45" y2="40" stroke="#64748b" stroke-width="1"/>
    <text x="30" y="75" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">TURBINE</text>
  </g>

  <!-- Shaft -->
  <line x1="560" y1="60" x2="610" y2="60" stroke="#475569" stroke-width="3"/>

  <!-- ═══════ GENERATOR ═══════ -->
  <g id="generator" transform="translate(610, 30)">
    <circle cx="30" cy="30" r="28" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="30" y="34" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="700">G</text>
    <text x="30" y="75" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">GENERATOR</text>
  </g>

  <!-- Power output line -->
  <line x1="668" y1="60" x2="720" y2="60" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="720" y="50" fill="#f59e0b" font-size="8">⚡ GRID</text>

  <!-- ═══════ CONDENSER ═══════ -->
  <g id="condenser" transform="translate(500, 160)">
    <rect x="0" y="0" width="80" height="50" rx="4" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="40" y="30" text-anchor="middle" fill="#64748b" font-size="9">CONDENSER</text>
    <text x="40" y="65" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="600">CONDENSER</text>
  </g>

  <!-- Exhaust steam (turbine → condenser) -->
  <path d="M 530 90 L 530 160" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- ═══════ FEEDWATER PUMP ═══════ -->
  <g id="feedwater-pump" transform="translate(420, 240)">
    <circle cx="20" cy="20" r="18" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="20" y="24" text-anchor="middle" fill="#3b82f6" font-size="8" font-weight="700">P</text>
    <text x="20" y="55" text-anchor="middle" fill="#94a3b8" font-size="8">PUMP</text>
  </g>

  <!-- Feedwater piping (condenser → pump → steam gen) -->
  <path d="M 540 210 L 540 260 L 460 260" stroke="#3b82f6" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M 420 260 L 390 260 L 390 220" stroke="#3b82f6" stroke-width="3" fill="none" opacity="0.5"/>

  <!-- ═══════ COOLING TOWER ═══════ -->
  <g id="cooling-tower" transform="translate(700, 130)">
    <!-- Hyperbolic tower shape -->
    <path d="M 30 180 Q 0 140 10 80 Q 15 40 30 0 Q 45 40 50 80 Q 60 140 30 180 Z"
          fill="#374151" stroke="#4b5563" stroke-width="2"/>
    <!-- Steam rising -->
    <path d="M 25 -5 Q 20 -20 30 -30" stroke="#94a3b8" stroke-width="2" fill="none" opacity="0.3"/>
    <path d="M 35 -5 Q 40 -25 30 -40" stroke="#94a3b8" stroke-width="2" fill="none" opacity="0.2"/>
    <text x="30" y="200" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="600">COOLING TOWER</text>
  </g>

  <!-- Cooling water pipes (condenser ↔ tower) -->
  <path d="M 580 185 L 700 185" stroke="#60a5fa" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 580 200 L 700 280" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- ═══════ PRIMARY COOLANT PUMP ═══════ -->
  <g id="primary-pump" transform="translate(280, 270)">
    <circle cx="15" cy="15" r="14" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="15" y="19" text-anchor="middle" fill="#3b82f6" font-size="7" font-weight="700">P</text>
    <text x="15" y="45" text-anchor="middle" fill="#94a3b8" font-size="7">COOLANT</text>
    <text x="15" y="54" text-anchor="middle" fill="#94a3b8" font-size="7">PUMP</text>
  </g>

  <!-- ═══════ LEGEND ═══════ -->
  <g transform="translate(20, 370)">
    <text x="0" y="0" fill="#64748b" font-size="9" font-weight="600">NUCLEAR REACTOR MODEL — Pressurized Water Reactor (PWR)</text>
    <g transform="translate(0, 18)">
      <rect x="0" y="0" width="12" height="8" fill="#ef4444" opacity="0.6" rx="1"/>
      <text x="18" y="8" fill="#94a3b8" font-size="8">Primary loop (hot)</text>
    </g>
    <g transform="translate(0, 32)">
      <rect x="0" y="0" width="12" height="8" fill="#3b82f6" opacity="0.6" rx="1"/>
      <text x="18" y="8" fill="#94a3b8" font-size="8">Primary/Secondary loop (cold)</text>
    </g>
    <g transform="translate(0, 46)">
      <rect x="0" y="0" width="12" height="8" fill="#94a3b8" opacity="0.4" rx="1"/>
      <text x="18" y="8" fill="#94a3b8" font-size="8">Steam</text>
    </g>
    <g transform="translate(0, 60)">
      <rect x="0" y="0" width="12" height="8" fill="#f59e0b" opacity="0.6" rx="1"/>
      <text x="18" y="8" fill="#94a3b8" font-size="8">Electrical output</text>
    </g>
    <g transform="translate(250, 18)">
      <text x="0" y="0" fill="#475569" font-size="7">1. Nuclear fission heats water in the primary loop</text>
      <text x="0" y="12" fill="#475569" font-size="7">2. Hot water transfers heat to secondary loop via steam generator</text>
      <text x="0" y="24" fill="#475569" font-size="7">3. Steam drives the turbine → generator produces electricity</text>
      <text x="0" y="36" fill="#475569" font-size="7">4. Steam condenses back to water, cooled by the cooling tower</text>
      <text x="0" y="48" fill="#475569" font-size="7">5. Feedwater pump returns water to the steam generator</text>
    </g>
  </g>
</svg>
